<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | AGR Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --text: #1a1a1a;
            --accent: #555;
            --placeholder: #e0e0e0;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        /* NAVIGATION - Fixed to be clickable on top of everything */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            position: relative; 
            z-index: 9999 !important; /* This ensures you can click the links */
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            color: var(--text);
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        nav ul li { margin-left: 2rem; }

        nav a {
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer !important;
        }

        nav a.active { border-bottom: 2px solid var(--text); }

        /* CONTACT LAYOUT */
        .container { 
            padding: 4rem 10%; 
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }

        /* PHOTO PLACEHOLDER */
        .contact-visual {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .photo-box {
            width: 100%;
            height: 500px;
            background: var(--placeholder);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            overflow: hidden;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* EMAIL DISPLAY */
        .email-display h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin: 0 0 0.5rem 0;
        }

        .email-link {
            font-size: 1.2rem;
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--placeholder);
            padding-bottom: 5px;
        }

        /* FORM STYLING */
        .contact-form h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--placeholder);
            background: transparent;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--text);
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 1.2rem;
            background: var(--text);
            color: white;
            text-decoration: none;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn:hover { background: var(--accent); }

        /* MOBILE VIEW */
        @media (max-width: 850px) {
            .contact-grid { grid-template-columns: 1fr; }
            .photo-box { height: 350px; }
            nav { flex-direction: column; gap: 1rem; }
            nav ul li { margin: 0 1rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">AGR Media</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="photography.html">Photography</a></li>
            <li><a href="design.html">Design</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="contact-grid">
            
            <div class="contact-visual">
                <div class="photo-box">
                
           <img src="../IMG_1814.JPG" alt="IMG_1814" title="IMG_1814" width="3456" height="5184" />          
                </div>
                
                <div class="email-display">
                    <h2>Get in touch directly</h2>
                    <a href="mailto:28agarciareyes@ggusd.net" class="email-link">28agarciareyes@ggusd.net</a>
                </div>
            </div>

            <div class="contact-form">
                <h2>Send a Message</h2>
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" placeholder="Name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" name="email" placeholder="Email" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" name="message" rows="8" placeholder="How can I help you?" required></textarea>
                    </div>

                    <button type="submit" class="btn">Submit Message</button>
                </form>
            </div>

        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | AGR Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212; 
            --card-bg: #1a1a1a;
            --text: #ffffff; /* Pure white for maximum pop */
            --accent: #ffffff; /* Changed from gray to white for labels */
            --border: #444444; /* Slightly lighter border for visibility */
            --button-hover: #e0e0e0;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        /* NAVIGATION */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 5%;
            position: relative; 
            z-index: 9999;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            color: var(--text);
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        nav ul li { margin-left: 2.5rem; }

        nav a {
            text-decoration: none;
            color: var(--text); /* Nav links now white */
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.8; /* Slight fade that goes to full white on hover */
            transition: 0.3s;
        }

        nav a:hover, nav a.active {
            opacity: 1;
            border-bottom: 1px solid var(--text);
        }

        /* LIGHTBOX/ZOOM FEATURE */
        .clickable-img {
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1), filter 0.3s ease;
        }
        .clickable-img:hover {
            transform: scale(1.04);
            filter: brightness(1.1);
        }

        #lightbox {
            display: none;
            position: fixed;
            z-index: 10000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.98);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(12px);
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 85%;
            max-height: 85%;
            border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
            animation: imageFade 0.4s ease-out;
        }

        @keyframes imageFade {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* CONTACT LAYOUT */
        .container { 
            padding: 4rem 10%; 
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .contact-grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 5rem;
            align-items: start;
        }

        .photo-box {
            width: 100%;
            height: 550px;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* EMAIL DISPLAY */
        .email-display { margin-top: 2rem; }
        .email-display h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .email-link {
            font-size: 1.1rem;
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px solid var(--text);
            padding-bottom: 5px;
            transition: 0.4s;
        }

        /* FORM STYLING */
        .contact-form h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-top: 0;
            margin-bottom: 2rem;
        }

        .form-group { margin-bottom: 1.8rem; }

        label {
            display: block;
            text-transform: uppercase;
            font-size: 0.7rem; /* Small font */
            letter-spacing: 2px;
            margin-bottom: 0.8rem;
            color: #ffffff; /* Now pure white */
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 1.2rem;
            border: 1px solid var(--border);
            background: var(--card-bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            box-sizing: border-box;
            border-radius: 4px;
            transition: 0.3s ease;
        }

        input::placeholder, textarea::placeholder {
            color: #888; /* Keeps placeholder subtle until user types */
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #ffffff;
            background: #222;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 1.3rem;
            background: #ffffff;
            color: #000000;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 4px;
            transition: 0.4s;
        }

        .btn:hover { 
            background: #cccccc;
            letter-spacing: 4px;
        }

        /* MOBILE VIEW */
        @media (max-width: 900px) {
            .contact-grid { grid-template-columns: 1fr; gap: 3rem; }
            .photo-box { height: 400px; }
            nav { flex-direction: column; gap: 1.5rem; text-align: center; }
            nav ul li { margin: 0 0.8rem; }
        }
    </style>
</head>
<body>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Full View">
    </div>

    <nav>
        <a href="index.html" class="logo">AGR Media</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="photography.html">Photography</a></li>
            <li><a href="design.html">Design</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="contact-grid">
            
            <div class="contact-visual">
                <div class="photo-box">
                    <img class="clickable-img" src="../IMG_1814.JPG" alt="Portrait" onclick="openLightbox(this.src)" />          
                </div>
                
                <div class="email-display">
                    <h2>Get in touch directly</h2>
                    <a href="mailto:28agarciareyes@ggusd.net" class="email-link">28agarciareyes@ggusd.net</a>
                </div>
            </div>

            <div class="contact-form">
                <h2>Send a Message</h2>
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="name">ALisson</label>
                        <input type="text" id="name" name="name" placeholder="Full Name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">28agarciareyes@ggusd.net</label>
                        <input type="email" id="email" name="email" placeholder="Email Address" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" name="message" rows="7" placeholder="Tell me about your project..." required></textarea>
                    </div>

                    <button type="submit" class="btn">Submit Message</button>
                </form>
            </div>

        </div>
    </div>

    <script>
        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lb.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designs | Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="logo">AGR Media</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="photography.html">Photography</a></li>
<li><a href="design.html" class="active">Design</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <header style="margin-bottom: 3rem;">
            <h1>My Designs </h1>
            <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; color: var(--accent);">My Showcase • 2026</p>
        </header>

        <div class="slideshow-window">
            <div class="mySlides fade">
                <img src="https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?auto=format&fit=crop&w=1200&q=80" alt="Design 1">
            </div>

            <div class="mySlides fade">
                <img src="https://images.unsplash.com/photo-1507652313519-d4e9174996dd?auto=format&fit=crop&w=1200&q=80" alt="Design 2">
            </div>

            <div class="mySlides fade">
                <img src="https://images.unsplash.com/photo-1449247709967-d4461a6a6103?auto=format&fit=crop&w=1200&q=80" alt="Design 3">
            </div>
            
            <div class="slide-overlay"></div>
        </div>
    </div>

    <script>
        let slideIndex = 0;
        showSlides();

        function showSlides() {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";  
            }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            slides[slideIndex-1].style.display = "block";  
            setTimeout(showSlides, 5000); // Changes image every 5 seconds for a relaxed feel
        }
    </script>
</body>
</html>

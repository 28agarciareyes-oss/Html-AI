<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designs | Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        .slideshow-window {
            position: relative;
            max-width: 1000px;
            margin: auto;
            overflow: hidden;
        }
        /* Fixed: Ensure slides are hidden by default to prevent a "flash" of all images */
        .mySlides {
            display: none;
        }
        .fade {
            animation-name: fade;
            animation-duration: 1.5s;
        }
        @keyframes fade {
            from {opacity: .4} 
            to {opacity: 1}
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">AGR Media</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="photography.html">Photography</a></li>
            <li><a href="design.html" class="active">Design</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <header style="margin-bottom: 3rem; text-align: center;">
            <h1>My Designs</h1>
            <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; color: var(--accent);">My Showcase • 2026</p>
        </header>

        <div class="slideshow-window">
            <div class="mySlides fade">
                <div class="photo-slide">
                    <img src="images/design1.png" alt="Screenshot 1" style="width: 100%; height: auto; max-height: 90vh; object-fit: contain; border-radius: 4px;">
                </div>
            </div>

            <div class="mySlides fade">
                <div class="photo-slide">
                    <img src="images/design2.png" alt="Screenshot 2" style="width: 100%; height: auto; max-height: 90vh; object-fit: contain; border-radius: 4px;">
                </div>
            </div>

            <div class="mySlides fade">
                <div class="photo-slide">
                    <img src="images/vector-landscape.png" alt="Vector Landscape" style="width: 100%; height: auto; max-height: 90vh; object-fit: contain; border-radius: 4px;">
                </div>
            </div>
        </div>
    </div>

    <script>
        let slideIndex = 0;
        showSlides();

        function showSlides() {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            if (slides.length === 0) return; // Safety check
            
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";  
            }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            slides[slideIndex-1].style.display = "block";  
            setTimeout(showSlides, 5000); 
        }
    </script>
</body>
</html>

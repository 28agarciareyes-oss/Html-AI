<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGR Media | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --text: #1a1a1a;
            --accent: #555;
            --placeholder: #e0e0e0;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* NAVIGATION - The Fix for your Contact Link */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            position: relative; 
            /* This ensures your navigation stays "on top" of the images */
            z-index: 9999 !important; 
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            color: var(--text);
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        nav ul li { margin-left: 2rem; }

        nav a {
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer !important;
            transition: color 0.3s;
        }

        nav a:hover { color: var(--accent); }
        nav a.active { border-bottom: 2px solid var(--text); }

        /* HERO SECTION */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1.2fr; /* Slightly larger showcase */
            height: calc(100vh - 100px);
            align-items: center;
        }

        .hero-text {
            padding: 0 10%;
        }

        .hero-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        .hero-text h1 em { font-style: italic; font-weight: 400; }

        .btn {
            display: inline-block;
            padding: 1.2rem 2.5rem;
            background: var(--text);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn:hover { background: var(--accent); transform: translateY(-2px); }

        /* AUTOMATIC SHOWCASE */
        .showcase-container {
            position: relative;
            width: 100%;
            height: 85%;
            overflow: hidden;
            background: var(--placeholder);
            box-shadow: -10px 10px 30px rgba(0,0,0,0.05);
        }

        .showcase-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .showcase-slide.active {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .hero { grid-template-columns: 1fr; height: auto; }
            .hero-text { padding: 4rem 5%; order: 2; text-align: center; }
            .showcase-container { height: 400px; order: 1; }
            .hero-text h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">AGR Media</a>
        <ul>
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="photography.html">Photography</a></li>
            <li><a href="design.html">Design</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main class="hero">
        <div class="hero-text">
            <h1>Alisson design, <br><em>creating</em> vision.</h1>
            <p>Welcome to my digital space where art meets strategy.</p>
            <a href="photography.html" class="btn">View Work</a>
        </div>

        <div class="showcase-container">
            <div class="showcase-slide active" style="background-image: url('https://images.unsplash.com/photo-1493863641943-9b68992a8d07?q=80&w=2058&auto=format&fit=crop');"></div>
            <div class="showcase-slide" style="background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop');"></div>
            <div class=<div class="showcase-slide" style="background-image: url('https://images.unsplash.com/photo-1499951360447-b19be8fe80f5?q=80&w=2070&auto=format&fit=crop');"></div>
        </div>
    </main>

    <script>
        let slides = document.querySelectorAll('.showcase-slide');
        let currentSlide = 0;

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        // Change image every 4.5 seconds
        setInterval(nextSlide, 4500);
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGR Media | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --text: #1a1a1a;
            --accent: #555;
            --placeholder: #e0e0e0;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* NAVIGATION */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            position: relative; 
            z-index: 9999; 
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text);
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        nav ul li { margin-left: 2rem; }

        nav a {
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: color 0.3s;
        }

        nav a:hover { color: var(--accent); }
        nav a.active { border-bottom: 2px solid var(--text); }

        /* HERO SECTION */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            height: calc(100vh - 100px);
            align-items: center;
        }

        .hero-text {
            padding: 0 10%;
        }

        .hero-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        .hero-text h1 em { font-style: italic; font-weight: 400; }

        .btn {
            display: inline-block;
            padding: 1.2rem 2.5rem;
            background: var(--text);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn:hover { background: var(--accent); transform: translateY(-2px); }

        /* SLIDESHOW SHOWCASE */
        .showcase-container {
            position: relative;
            width: 100%; 
            height: 85%;
            overflow: hidden;
            background: #000;
            box-shadow: -10px 10px 30px rgba(0,0,0,0.05);
        }

        .showcase-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        .showcase-slide.active {
            opacity: 1;
        }

        /* NAVIGATION ARROWS */
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 24px;
            transition: 0.3s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
            background-color: rgba(0,0,0,0.2);
            z-index: 100;
            text-decoration: none;
        }

        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }

        .prev:hover, .next:hover {
            background-color: rgba(0,0,0,0.8);
        }

        /* DOTS INDICATOR */
        .dots-container {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            z-index: 100;
        }

        .dot {
            cursor: pointer;
            height: 10px;
            width: 10px;
            margin: 0 4px;
            background-color: rgba(255,255,255,0.5);
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.6s ease;
        }

        .dot.active {
            background-color: white;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .hero { grid-template-columns: 1fr; height: auto; }
            .hero-text { padding: 4rem 5%; order: 2; text-align: center; }
            .showcase-container { height: 400px; order: 1; }
            .hero-text h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">AGR Media</a>
        <ul>
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="photography.html">Photography</a></li>
            <li><a href="design.html">Design</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main class="hero">
        <div class="hero-text">
            <h1>Alisson design, <br><em>creating</em> vision.</h1>
            <p>Welcome to my digital space where art meets strategy.</p>
            <a href="photography.html" class="btn">View Work</a>
        </div>

    <div class="showcase-container">
        <div class="showcase-slide" style="background-image: url('mixed up image.jpg');"></div>
         <div class="showcase-slide active" style="background-image: url('shirt logo.jpg');"></div>
        <div class="showcase-slide" style="background-image: url('vector landscape.jpg');"></div>
        <div class="showcase-slide" style="background-image: url('celebrity collage.jpg');"></div>
        <div class="showcase-slide" style="background-image: url('movie poster.jpg');"></div>
        <div class="showcase-slide" style="background-image: url('gghs logo.jpg');"></div>
        <div class="showcase-slide" style="background-image: url('motiveation.jpg');"></div>

        <a class="prev" onclick="changeSlide(-1)">&#10094;</a>
        <a class="next" onclick="changeSlide(1)">&#10095;</a>
    </div>
</main>
            <div class="dots-container">
                <span class="dot active" onclick="currentSlideTo(0)"></span>
                <span class="dot" onclick="currentSlideTo(1)"></span>
                <span class="dot" onclick="currentSlideTo(2)"></span>
                <span class="dot" onclick="currentSlideTo(3)"></span>
                <span class="dot" onclick="currentSlideTo(4)"></span>
                <span class="dot" onclick="currentSlideTo(5)"></span>
                <span class="dot" onclick="currentSlideTo(6)"></span>
            </div>
        </div>
    </main>

    <script>
        let slideIndex = 0;
        const slides = document.querySelectorAll('.showcase-slide');
        const dots = document.querySelectorAll('.dot');
        let slideTimer;

        function showSlide(n) {
            // Hide all slides
            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));
            
            // Loop logic
            slideIndex = (n + slides.length) % slides.length;
            
            // Show new slide
            slides[slideIndex].classList.add('active');
            dots[slideIndex].classList.add('active');
            
            // Reset timer so it doesn't flip immediately after a manual click
            resetTimer();
        }

        function changeSlide(n) {
            showSlide(slideIndex + n);
        }

        function currentSlideTo(n) {
            showSlide(n);
        }

        function resetTimer() {
            clearInterval(slideTimer);
            slideTimer = setInterval(() => changeSlide(1), 5000);
        }

        // Start auto-play
        resetTimer();
    </script>

</body>
</html>
